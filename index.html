<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL 랜덤 챔피언 추첨기</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ========================= -->
<!-- SETUP PAGE -->
<!-- ========================= -->

<section id="setupPage">

    <div class="container">

        <h1 class="title">
            LEAGUE OF LEGENDS
        </h1>

        <h2 class="subtitle">
            RANDOM CHAMPION PICKER
        </h2>

        <div class="option-area">

            <label class="checkbox-wrap">

                <input
                    type="checkbox"
                    id="allowDuplicate"
                    checked
                >

                챔피언 중복 허용

            </label>

        </div>

        <div id="playerInputs"></div>

        <button id="startBtn">
            추첨 시작
        </button>

    </div>

</section>

<!-- ========================= -->
<!-- REVEAL PAGE -->
<!-- ========================= -->

<section
    id="revealPage"
    class="hidden"
>

    <div class="container">

        <h1 class="title">
            CHAMPION REVEAL
        </h1>

        <div class="current-reveal-info">

            현재 공개 중 :

            <span id="currentPlayerName">
                -
            </span>

        </div>

        <div
            id="countdown"
            class="countdown"
        ></div>

        <div
            id="allPlayersReveal"
            class="all-players-reveal"
        ></div>

    </div>

</section>

<!-- ========================= -->
<!-- FINAL RESULT PAGE -->
<!-- ========================= -->

<section
    id="finalPage"
    class="hidden"
>

    <div class="container">

        <h1 class="title">
            FINAL RESULT
        </h1>

        <div
            id="finalResultContainer"
            class="final-result-container"
        ></div>

        <div class="button-group">

            <button id="teamBuildBtn">
                팀 구성하기
            </button>

            <button id="restartBtn">
                다시 추첨하기
            </button>

        </div>

    </div>

</section>

<!-- ========================= -->
<!-- TEAM BUILD PAGE -->
<!-- ========================= -->

<section
    id="teamBuildPage"
    class="hidden"
>

    <div class="container">

        <h1 class="title">
            TEAM BUILD
        </h1>

        <p class="team-guide">
            플레이어를 선택 후 팀 이동 버튼을 눌러주세요
        </p>

        <!-- 이동 버튼 -->

        <div class="team-action-bar">

            <button id="moveToTeam1Btn">
                ▶ 1팀 보내기
            </button>

            <button id="moveToTeam2Btn">
                ▶ 2팀 보내기
            </button>

        </div>

        <div class="team-build-layout">

            <!-- 1팀 -->

            <div
                class="team-area"
            >

                <h2>
                    1팀
                </h2>

                <div
                    id="team1Players"
                ></div>

            </div>

            <!-- 선수목록 -->

            <div
                class="available-area"
            >

                <h2>
                    선수 목록
                </h2>

                <div
                    id="availablePlayers"
                ></div>

            </div>

            <!-- 2팀 -->

            <div
                class="team-area"
            >

                <h2>
                    2팀
                </h2>

                <div
                    id="team2Players"
                ></div>

            </div>

        </div>

        <div class="button-group">

            <button id="backToResultBtn">
                결과 화면으로
            </button>

        </div>

    </div>

</section>

<script src="app.js"></script>

</body>
</html>
