<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL 랜덤 챔피언 추첨기</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ========================= -->
    <!-- 시작 화면 -->
    <!-- ========================= -->

    <section id="setupPage">

        <div class="container">

            <h1 class="title">
                LEAGUE OF LEGENDS
            </h1>

            <h2 class="subtitle">
                RANDOM CHAMPION PICKER
            </h2>

            <div class="option-area">

                <label class="checkbox-wrap">

                    <input
                        type="checkbox"
                        id="allowDuplicate"
                        checked
                    >

                    챔피언 중복 허용

                </label>

            </div>

            <!-- 플레이어 입력 영역 -->
            <div id="playerInputs"></div>

            <button id="startBtn">
                추첨 시작
            </button>

        </div>

    </section>

    <!-- ========================= -->
    <!-- 챔피언 공개 화면 -->
    <!-- ========================= -->

    <section
        id="revealPage"
        class="hidden"
    >

        <div class="container">

            <h1 class="title">
                CHAMPION REVEAL
            </h1>

            <div class="current-reveal-info">

                현재 공개 중 :

                <span id="currentPlayerName">
                    -
                </span>

            </div>

            <div
                id="countdown"
                class="countdown"
            ></div>

            <div
                id="allPlayersReveal"
                class="all-players-reveal"
            ></div>

        </div>

    </section>

    <!-- ========================= -->
    <!-- 최종 결과 화면 -->
    <!-- ========================= -->

    <section
        id="finalPage"
        class="hidden"
    >

        <div class="container">

            <h1 class="title">
                FINAL RESULT
            </h1>

            <div
                id="finalResultContainer"
                class="final-result-container"
            ></div>

            <div class="button-group">

                <button id="teamBuildBtn">
                    팀 구성하기
                </button>

                <button id="restartBtn">
                    다시 추첨하기
                </button>

            </div>

        </div>

    </section>

    <!-- ========================= -->
    <!-- TEAM BUILD 화면 -->
    <!-- ========================= -->

    <section
        id="teamBuildPage"
        class="hidden"
    >

        <div class="container">

            <h1 class="title">
                TEAM BUILD
            </h1>

            <p class="team-guide">
                선수를 선택한 뒤 원하는 팀 영역을 클릭하세요
            </p>

            <div class="team-build-layout">

                <!-- 1팀 -->

                <div
                    id="team1Area"
                    class="team-area"
                >

                    <h2>
                        1팀
                    </h2>

                </div>

                <!-- 선수 목록 -->

                <div
                    class="available-area"
                >

                    <h2>
                        선수 목록
                    </h2>

                    <div
                        id="availablePlayers"
                    ></div>

                </div>

                <!-- 2팀 -->

                <div
                    id="team2Area"
                    class="team-area"
                >

                    <h2>
                        2팀
                    </h2>

                </div>

            </div>

        </div>

    </section>

    <script src="app.js"></script>

</body>
</html>
